name: Auto-merge

# Squash-merges a PR as soon as its CI run goes green.
# Native GitHub auto-merge needs required-status-check branch protection,
# which free private repos don't get — so we trigger off the CI workflow
# completing successfully instead. deploy.yml doesn't run on PRs, so a
# green CI run means the PR is green.
on:
  workflow_run:
    workflows: [CI]
    types: [completed]

permissions:
  contents: write
  pull-requests: write
  actions: write # to dispatch deploy.yml after merging

jobs:
  automerge:
    # Only when the CI run was for a pull request and it passed.
    if: >
      github.event.workflow_run.event == 'pull_request' &&
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Merge the PR whose CI just passed
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          OWNER: ${{ github.repository_owner }}
          HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          set -euo pipefail

          pr=$(gh api "repos/$REPO/commits/$HEAD_SHA/pulls" \
                 --jq '.[] | select(.state=="open") | .number' | head -n1)
          if [ -z "${pr:-}" ]; then
            echo "No open PR for $HEAD_SHA — nothing to merge."
            exit 0
          fi

          meta=$(gh pr view "$pr" --repo "$REPO" --json isDraft,labels,author)
          # Public-repo safety: only auto-merge PRs opened by the repo owner.
          # Never auto-merge outside contributors' / forks' PRs.
          author=$(echo "$meta" | jq -r .author.login)
          if [ "$author" != "$OWNER" ]; then
            echo "PR #$pr authored by '$author', not owner '$OWNER' — skipping."
            exit 0
          fi
          if [ "$(echo "$meta" | jq -r .isDraft)" = "true" ]; then
            echo "PR #$pr is a draft — skipping."
            exit 0
          fi
          # Escape hatch: add the 'no-automerge' label to hold a PR open.
          if echo "$meta" | jq -e '.labels[]? | select(.name=="no-automerge")' >/dev/null; then
            echo "PR #$pr has the no-automerge label — skipping."
            exit 0
          fi

          echo "CI green for #$pr — squash-merging."
          gh pr merge "$pr" --repo "$REPO" --squash --delete-branch

          # The merge push is made with GITHUB_TOKEN, so it won't trigger
          # deploy.yml's `push` event. Explicitly dispatch the deploy against
          # the freshly-merged main (workflow_dispatch is exempt from the guard).
          echo "Dispatching deploy for merged main."
          gh workflow run deploy.yml --repo "$REPO" --ref main
