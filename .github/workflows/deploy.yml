name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  # Auto-merge squash-merges PRs with GITHUB_TOKEN, and pushes made by
  # GITHUB_TOKEN do NOT trigger the push event above (GitHub's recursion
  # guard). workflow_dispatch is an explicit exception to that guard, so
  # automerge.yml calls `gh workflow run deploy.yml` after merging.
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      # The `secrets` context is NOT allowed in an `if:` conditional (it fails
      # workflow compilation). So we pipe the secret into a step's env and gate
      # the real steps on this guard's output — meaning main shows a green/neutral
      # run (not a red X) when Cloudflare secrets aren't configured.
      - name: Check for Cloudflare secrets
        id: guard
        env:
          CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          if [ -n "$CF_TOKEN" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "No CLOUDFLARE_API_TOKEN secret set — skipping deploy."
          fi

      - uses: actions/checkout@v4
        if: steps.guard.outputs.configured == 'true'

      - uses: oven-sh/setup-bun@v2
        if: steps.guard.outputs.configured == 'true'
        with:
          bun-version: 1.3.9

      - name: Install dependencies
        if: steps.guard.outputs.configured == 'true'
        run: bun install --frozen-lockfile

      - name: Build
        if: steps.guard.outputs.configured == 'true'
        run: bun run build

      - name: Deploy to Cloudflare Pages
        if: steps.guard.outputs.configured == 'true'
        run: npx wrangler pages deploy dist --project-name=sailing-vocab --branch=main
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
